# ─────────────────────────────────────────────────────────────────────────────
# Normalized Engine — separate container, independent from e47_engine
#
# Runs engine_normalized.py on its own schedule with its own Webull
# connections, candle cache, and output directory. Does not interfere
# with the original engine in any way.
#
# Start:   docker-compose -f docker-compose.normalized.yml up -d
# Stop:    docker-compose -f docker-compose.normalized.yml down
# Logs:    docker logs e47_engine_normalized -f
# Restart: docker-compose -f docker-compose.normalized.yml restart
# ─────────────────────────────────────────────────────────────────────────────

services:
  engine_normalized:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /cache
    container_name: e47_engine_normalized
    restart: unless-stopped
    env_file:
      - ./.env
    stop_grace_period: 120s
    volumes:
      - ./:/app:ro
      - ./output/normalized_engine:/cache/output/normalized_engine
      - ./credentials:/credentials:ro
      - engine_normalized_cache:/cache
    environment:
      # ── InfluxDB (shared with original engine) ────────────────────────────
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: element47-dev-token
      INFLUX_ORG: element47
      INFLUX_BUCKET: sma_engine
      # ── Webull (loaded from .env via env_file) ────────────────────────────
      WEBULL_REGION: us
      ENGINE_SOURCE: webull
      PYTHONUNBUFFERED: "1"
      GOOGLE_SHEETS_CREDENTIALS_PATH: /credentials/sheets.json
      # ── Normalized engine settings ────────────────────────────────────────
      NORM_INTERVAL_SECONDS: ${NORM_INTERVAL_SECONDS:-7800}
      NORM_TOP_N: ${NORM_TOP_N:-2000}
      NORM_LOOKBACK: ${NORM_LOOKBACK:-390}
      NORM_TIMEFRAMES: ${NORM_TIMEFRAMES:-5m,10m,15m,20m,30m,1h,2h,4h,1d,1w,1mo}
      NORM_TRACKER_TOP: ${NORM_TRACKER_TOP:-50}
      NORM_SCAN_WORKERS: ${NORM_SCAN_WORKERS:-12}
    command: python3 /app/daemon_normalized.py
    networks:
      - sma_engine_default

networks:
  sma_engine_default:
    external: true
    name: sma_engine_default

volumes:
  engine_normalized_cache:
